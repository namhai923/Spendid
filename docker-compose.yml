services:
  spendid.api:
    image: ${DOCKER_REGISTRY-}spendidapi
    container_name: Spendid.Api
    environment:
      - Authentication__Google__ClientId=${GOOGLE_CLIENT_ID}
      - Authentication__Google__ClientSecret=${GOOGLE_CLIENT_SECRET}
      
      - Authorization__AllowedEmails=${ALLOWED_EMAILS}

      - ConnectionStrings__Database=Host=spendid.db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD};
    build:
      context: .
      dockerfile: Spendid.Api/Dockerfile
    depends_on:
      spendid.db:
        condition: service_healthy

  spendid.db:
    image: postgres:latest
    container_name: Spendid.Db
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./.containers/database:/var/lib/postgresql
    ports:
      - ${DB_HOST_PORT:-5432}:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  spendid.seq:
    image: datalust/seq:latest
    container_name: Spendid.Seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    ports:
      - 5341:5341
      - 8081:80

  spendid.redis:
    image: redis:latest
    container_name: Spendid.Redis
    restart: always
    ports:
      - 6379:6379
